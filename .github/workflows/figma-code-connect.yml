name: Figma Code Connect

on:
  push:
    branches: ["main"]
    paths:
      - "figma.config.json"
      - "**/*.figma.js"
      - "**/*.figma.jsx"
      - "**/*.figma.ts"
      - "**/*.figma.tsx"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ vars.FIGMA_CODE_CONNECT_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install lead-ui dependencies
        run: npm ci --prefix packages/lead-ui --workspaces=false

      - name: Validate Code Connect mappings (dry-run)
        working-directory: packages/lead-ui
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
        run: npx figma connect publish --dry-run

      - name: Publish Code Connect mappings
        working-directory: packages/lead-ui
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
        run: npx figma connect publish
