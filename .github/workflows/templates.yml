name: Templates

on:
  pull_request:
    branches: ["*"]
    paths:
      - ".github/workflows/templates.yml"
      - "apps/v4/registry/**"
      - "package.json"
      - "packages/shadcn/src/commands/add.ts"
      - "packages/shadcn/src/commands/init.ts"
      - "packages/shadcn/src/templates/**"
      - "packages/shadcn/src/utils/create-project.ts"
      - "packages/shadcn/src/utils/get-monorepo-info.ts"
      - "packages/shadcn/src/utils/get-package-manager.ts"
      - "pnpm-lock.yaml"
      - "templates/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    name: pnpm ${{ matrix.pnpm-version }}
    permissions:
      contents: read
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        pnpm-version: ["10.33.4"]
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:4000
      NEXT_PUBLIC_V0_URL: https://v0.dev
      REGISTRY_URL: http://localhost:4000/r
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10.33.4
          run_install: false

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "pnpm_cache_dir=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          pnpm --filter=shadcn build
          pnpm --filter=v4 registry:build

      - name: Validate templates
        env:
          TEMPLATE_PNPM_VERSION: ${{ matrix.pnpm-version }}
          SHADCN_TEMPLATE_DIR: ${{ github.workspace }}/templates
        run: |
          set -euo pipefail

          root_pnpm="$(command -v pnpm)"
          validation_script="$RUNNER_TEMP/validate-templates.sh"

          cat > "$validation_script" <<'BASH'
          set -euo pipefail

          bin_dir="$RUNNER_TEMP/template-pnpm-bin"
          mkdir -p "$bin_dir"

          cat > "$bin_dir/pnpm" <<'PNPM'
          #!/usr/bin/env bash
          exec npx -y "pnpm@${TEMPLATE_PNPM_VERSION}" "$@"
          PNPM
          chmod +x "$bin_dir/pnpm"
          export PATH="$bin_dir:$PATH"
          export npm_config_user_agent="pnpm/${TEMPLATE_PNPM_VERSION}"

          echo "Using template pnpm $(pnpm --version)"

          cli="$GITHUB_WORKSPACE/packages/shadcn/dist/index.js"
          template_root="$RUNNER_TEMP/generated-templates-pnpm-${TEMPLATE_PNPM_VERSION}"
          rm -rf "$template_root"
          mkdir -p "$template_root"

          templates=(next vite astro start react-router)
          modes=(app monorepo)

          has_script() {
            node -e "const pkg = require('./package.json'); process.exit(pkg.scripts && pkg.scripts[process.argv[1]] ? 0 : 1)" "$1"
          }

          run_script_if_present() {
            local script="$1"
            if has_script "$script"; then
              pnpm run "$script"
            else
              echo "No $script script found; skipping."
            fi
          }

          for template in "${templates[@]}"; do
            for mode in "${modes[@]}"; do
              project="test-${template}-${mode}"
              project_path="$template_root/$project"

              echo "::group::${template} ${mode}"
              args=(
                init
                --defaults
                --name "$project"
                --template "$template"
                --cwd "$template_root"
                --silent
              )

              if [ "$mode" = "monorepo" ]; then
                args+=(--monorepo)
              else
                args+=(--no-monorepo)
              fi

              SHADCN_TEMPLATE_DIR="$SHADCN_TEMPLATE_DIR" \
                REGISTRY_URL="$REGISTRY_URL" \
                node "$cli" "${args[@]}"

              cd "$project_path"
              pnpm install --frozen-lockfile
              run_script_if_present typecheck
              run_script_if_present build
              echo "::endgroup::"
            done
          done

          bun_template_root="$RUNNER_TEMP/generated-templates-bun"
          rm -rf "$bun_template_root"
          mkdir -p "$bun_template_root"

          for mode in app monorepo; do
            project="test-next-${mode}-bun"
            project_path="$bun_template_root/$project"

            echo "::group::next ${mode} bun"
            args=(
              init
              --defaults
              --name "$project"
              --template next
              --cwd "$bun_template_root"
              --silent
            )

            if [ "$mode" = "monorepo" ]; then
              args+=(--monorepo)
            else
              args+=(--no-monorepo)
            fi

            SHADCN_TEMPLATE_DIR="$SHADCN_TEMPLATE_DIR" \
              REGISTRY_URL="$REGISTRY_URL" \
              npm_config_user_agent="bun/$(bun --version)" \
              bunx --bun --package "$GITHUB_WORKSPACE/packages/shadcn" \
                shadcn "${args[@]}"

            cd "$project_path"
            test ! -f pnpm-workspace.yaml
            test ! -f pnpm-lock.yaml

            node <<'NODE'
          const fs = require("node:fs")

          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"))
          const workspaces = pkg.workspaces ?? []
          const invalidWorkspaces = ["sharp", "unrs-resolver", "esbuild"]

          if (!Array.isArray(workspaces)) {
            throw new Error("Expected package.json workspaces to be an array.")
          }

          for (const workspace of invalidWorkspaces) {
            if (workspaces.includes(workspace)) {
              throw new Error(`Unexpected workspace entry: ${workspace}`)
            }
          }

          if (!pkg.packageManager?.startsWith("bun@")) {
            throw new Error(`Expected packageManager to use bun, got ${pkg.packageManager}`)
          }
          NODE

            bun install
            echo "::endgroup::"
          done

          npm_template_root="$RUNNER_TEMP/generated-templates-npm"
          npm_project="test-next-monorepo-npm"
          npm_project_path="$npm_template_root/$npm_project"
          rm -rf "$npm_template_root"
          mkdir -p "$npm_template_root"

          echo "::group::next monorepo npm"
          SHADCN_TEMPLATE_DIR="$SHADCN_TEMPLATE_DIR" \
            REGISTRY_URL="$REGISTRY_URL" \
            npm_config_user_agent="npm/$(npm --version)" \
            npx --yes --package "$GITHUB_WORKSPACE/packages/shadcn" \
              shadcn \
              init \
              --defaults \
              --name "$npm_project" \
              --template next \
              --cwd "$npm_template_root" \
              --silent \
              --monorepo

          cd "$npm_project_path"
          test ! -f pnpm-workspace.yaml
          test ! -f pnpm-lock.yaml

          node <<'NODE'
          const fs = require("node:fs")
          const path = require("node:path")

          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"))
          const workspaces = pkg.workspaces ?? []

          if (!Array.isArray(workspaces)) {
            throw new Error("Expected package.json workspaces to be an array.")
          }

          for (const workspace of ["sharp", "unrs-resolver", "esbuild"]) {
            if (workspaces.includes(workspace)) {
              throw new Error(`Unexpected workspace entry: ${workspace}`)
            }
          }

          if (!pkg.packageManager?.startsWith("npm@")) {
            throw new Error(`Expected packageManager to use npm, got ${pkg.packageManager}`)
          }

          const packageJsonFiles = []
          function collectPackageJsonFiles(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (entry.name === "node_modules") {
                continue
              }

              const fullPath = path.join(dir, entry.name)
              if (entry.isDirectory()) {
                collectPackageJsonFiles(fullPath)
              } else if (entry.name === "package.json") {
                packageJsonFiles.push(fullPath)
              }
            }
          }

          collectPackageJsonFiles(process.cwd())

          for (const file of packageJsonFiles) {
            const json = fs.readFileSync(file, "utf8")
            if (json.includes("workspace:")) {
              throw new Error(`Unexpected workspace: protocol in ${file}`)
            }
          }
          NODE
          echo "::endgroup::"
          BASH

          "$root_pnpm" exec start-server-and-test \
            "$root_pnpm v4:dev" \
            http://localhost:4000 \
            "bash $validation_script"
