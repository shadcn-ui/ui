# Token Publishing — Lane 2 v1 (JES-74)
# Contract: docs/token-publishing-action-design.md
#
# Manual `workflow_dispatch` only. A designer (or engineer) triggers the
# workflow after publishing token changes in Figma. The action:
#   1. Fetches the Figma variables export (File Read scope; existing secret).
#   2. Runs the token CLI pipeline (import → normalize → build).
#   3. Validates the regenerated tokens.css survives lead-ui typecheck/test/build.
#   4. If anything changed, opens a draft PR. If not, exits cleanly.
#
# Never pushes to `main`. Never auto-merges. Code Connect publishing
# (Lane 1) is a separate workflow with separate gating.
name: Token Publishing

on:
  workflow_dispatch:
    inputs:
      figma_file_key:
        description: "Figma file key (segment after /design/ in the file URL)"
        required: true
        default: "f2gKVfCJNOS0MeLUk4CM8u"
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            packages/lead-design-tokens-cli/package-lock.json
            packages/lead-ui/package-lock.json

      - name: Install token CLI deps
        run: npm ci --prefix packages/lead-design-tokens-cli --workspaces=false

      - name: Install lead-ui deps
        run: npm ci --prefix packages/lead-ui --workspaces=false

      - name: Fetch Figma variables export
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_FILE_KEY: ${{ inputs.figma_file_key }}
        run: |
          curl --fail --silent --show-error \
            -H "X-Figma-Token: $FIGMA_ACCESS_TOKEN" \
            "https://api.figma.com/v1/files/$FIGMA_FILE_KEY/variables/local" \
            -o /tmp/figma-export.json
          test -s /tmp/figma-export.json

      - name: Run import → normalize → build
        working-directory: packages/lead-design-tokens-cli
        run: |
          node bin/design-tokens.js import --from figma --figma-export /tmp/figma-export.json --force
          node bin/design-tokens.js normalize --from figma --force
          node bin/design-tokens.js build \
            --input tokens/normalized/tokens.json \
            --out ../lead-ui/src/generated/tokens.css

      - name: Validate (typecheck + test + build)
        run: |
          npm run lead:ui:typecheck
          npm run lead:ui:test
          npm run lead:ui:build

      - name: Detect diff
        id: diff
        run: |
          # Stage paths the pipeline writes so newly-created files show up
          # in `git diff --cached`. (`git diff` alone misses untracked files.)
          git add --intent-to-add \
            packages/lead-ui/src/generated/tokens.css \
            packages/lead-design-tokens-cli/tokens/raw/figma \
            packages/lead-design-tokens-cli/tokens/normalized \
            2>/dev/null || true
          if git diff --quiet -- \
            packages/lead-ui/src/generated/tokens.css \
            packages/lead-design-tokens-cli/tokens/raw/figma \
            packages/lead-design-tokens-cli/tokens/normalized; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Token artifacts unchanged — no PR needed."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open draft PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIGMA_FILE_KEY: ${{ inputs.figma_file_key }}
        run: |
          BRANCH="tokens/figma-publish/${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add packages/lead-ui/src/generated/tokens.css \
                  packages/lead-design-tokens-cli/tokens/raw/figma \
                  packages/lead-design-tokens-cli/tokens/normalized
          git commit -m "chore(tokens): regenerate from Figma file ${FIGMA_FILE_KEY}"
          git push -u origin "$BRANCH"
          gh pr create \
            --draft \
            --base main \
            --head "$BRANCH" \
            --title "chore(tokens): regenerate from Figma" \
            --body "$(cat <<EOF
          Auto-generated by \`.github/workflows/token-publishing.yml\` (JES-74).

          - Figma file key: \`${FIGMA_FILE_KEY}\`
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Validation passed before PR creation: \`lead:ui:typecheck\` + \`lead:ui:test\` + \`lead:ui:build\`.

          **Review checklist before marking ready:**
          - Diff in \`packages/lead-ui/src/generated/tokens.css\` matches the intended Figma changes.
          - Visual / brand / contrast implications confirmed.
          - No unintended renames or removals.

          Contract: \`docs/token-publishing-action-design.md\`.
          EOF
          )"
